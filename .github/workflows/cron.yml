name: Public Browser Cron Trigger

on:
  schedule:
    - cron: '0 * * * *' # 每 30 分钟运行一次
  workflow_dispatch:

jobs:
  run-private-browser:
    runs-on: ubuntu-latest # 保持你原本成功的免费环境，绝不动它

    steps:
    - name: Pull Private Script
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/zo-ai-shuaxin-jiaoben' 
        token: ${{ secrets.MY_GITHUB_PAT }}
        ref: 'main' # 强制锁定主分支
        # 🌟【核心修改】：精准指定只拉取私库里的 zo-ai.py 文件
        sparse-checkout: |
          zo-ai.py
        sparse-checkout-cone-mode: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 保持原样

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright 
        playwright install chromium --with-deps

    - name: Execute Keep Alive Browser
      env:
        ZO_COOKIES_JSON: ${{ secrets.ZO_COOKIES_JSON }}
        ZO_ACCESS_TOKEN: ${{ secrets.ZO_ACCESS_TOKEN }}
      # 🌟【修改点】：执行名字同步改为 zo-ai.py
      run: python zo-ai.py

    # 👇【原封不动保留】：无论运行成功还是失败，都强行把当前目录下所有的 .png 图片提取出来打包
    - name: Upload Live Screenshots
      uses: actions/upload-artifact@v4
      if: always() # 确保即使脚本报错了，也能把报错截图传上来供你排查
      with:
        name: zo-computer-live-ui # 压缩包的名字
        path: ./*.png             # 匹配所有的 png 截图
        retention-days: 3         # 自动留存3天，过期自动清理节约空间
