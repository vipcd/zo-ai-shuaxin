name: Public Browser Cron Trigger

on:
  schedule:
    - cron: '17 */2 * * *' # 
  workflow_dispatch:

# 给工作流赋予删除历史记录的权限
permissions:
  actions: write
  contents: read

jobs:
  run-private-browser:
    runs-on: ubuntu-latest # 保持你原本成功的免费环境，绝不动它

    steps:
    - name: Pull Private Script
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/zo-ai-shuaxin-jiaoben' 
        token: ${{ secrets.MY_GITHUB_PAT }}
        ref: 'main'
        sparse-checkout: |
          zo-ai.py
        sparse-checkout-cone-mode: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright 
        playwright install chromium --with-deps

    - name: Execute Keep Alive Browser
      env:
        ZO_COOKIES_JSON: ${{ secrets.ZO_COOKIES_JSON }}
        ZO_ACCESS_TOKEN: ${{ secrets.ZO_ACCESS_TOKEN }}
      run: python zo-ai.py

    - name: Upload Live Screenshots
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: zo-computer-live-ui 
        path: ./*.png             
        retention-days: 2         # 🌟 同步修改：截图文件也只保留 2 天，到期自动彻底销毁

    # 🌟【全新新增】：每次运行完毕后，自动去把你列表中 2 天前的旧历史记录斩草除根
    - name: Clean up old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      if: always() # 确保无论脚本成功还是失败，都执行清理
      with:
        token: ${{ secrets.MY_GITHUB_PAT }} # 使用你的个人密钥执行删除
        repository: ${{ github.repository }}
        retain_days: 2                      # 🌟 只保留最近 2 天的历史记录
        keep_minimum_runs: 3                # 🌟 保底行数：无论如何至少保留最近的 3 条记录，防止列表空掉
