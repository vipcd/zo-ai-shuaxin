name: Public Browser Cron Trigger

on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分钟运行一次
  workflow_dispatch:

jobs:
  run-private-browser:
    runs-on: ubuntu-latest # 免费环境

    steps:
    - name: Pull Private Script
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/zo-ai-shuaxin-jiaoben' 
        token: ${{ secrets.MY_GITHUB_PAT }}
        ref: 'main' # 强制锁定主分支

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright 
        playwright install chromium --with-deps

    - name: Execute Keep Alive Browser
      env:
        # 👇 在这里把这两个密钥同时传递给运行脚本
        ZO_COOKIES_JSON: ${{ secrets.ZO_COOKIES_JSON }}
        ZO_ACCESS_TOKEN: ${{ secrets.ZO_ACCESS_TOKEN }}
      run: python keep_alive.py
