name: Public Browser Cron Trigger

on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分钟运行一次
  workflow_dispatch:

jobs:
  run-private-browser:
    runs-on: ubuntu-latest # 免费环境

    steps:
    - name: Pull Private Script
      uses: actions/checkout@v4
      with:
        repository: 'vipcd/zo-ai-shuaxin-jiaoben' 
        token: ${{ secrets.MY_GITHUB_PAT }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        # 安装 Playwright 所需的浏览器内核
        playwright install chromium --with-deps

    - name: Execute Keep Alive Browser
      env:
        ZO_COOKIES_JSON: ${{ secrets.ZO_COOKIES_JSON }}
      run: python keep_alive.py
