name: Public Cron Trigger

on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分钟运行一次
  workflow_dispatch:

jobs:
  run-private-script:
    runs-on: ubuntu-latest # 公开库的虚拟机运行完全免费，不扣除你的 2000 分钟额度

    steps:
    # 第一步：使用你的 PAT 钥匙，把私有库的代码拉取到当前的公开库运行环境中
    - name: Pull Private Script
      uses: actions/checkout@v4
      with:
        repository: 'vipcd/zo-ai-shuaxin-jiaoben' # 替换为你的私有库路径
        token: ${{ secrets.MY_GITHUB_PAT }} # 跨库钥匙

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 第二步：运行私有库里拉取过来的脚本，并将环境变量注入进去
    - name: Execute Keep Alive
      env:
        ZO_ACCESS_TOKEN: ${{ secrets.ZO_ACCESS_TOKEN }} # 从当前公开库的 Secrets 中注入
      run: python keep_alive.py
