name: Public Browser Cron Trigger

on:
  schedule:
    - cron: '30 1,4,7,10,13,16,19,22 * * *' # 每 30 分钟运行一次
  workflow_dispatch:

jobs:
  run-private-browser:
    runs-on: ubuntu-latest # 免费环境

    steps:
    - name: Pull Private Script
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/zo-ai-shuaxin-jiaoben' 
        token: ${{ secrets.MY_GITHUB_PAT }}
        ref: 'main' # 强制锁定主分支

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright 
        playwright install chromium --with-deps

    - name: Execute Keep Alive Browser
      env:
        ZO_COOKIES_JSON: ${{ secrets.ZO_COOKIES_JSON }}
        ZO_ACCESS_TOKEN: ${{ secrets.ZO_ACCESS_TOKEN }}
      run: python keep_alive.py

    # 👇【核心新增】：无论运行成功还是失败，都强行把当前目录下所有的 .png 图片提取出来打包
    - name: Upload Live Screenshots
      uses: actions/upload-artifact@v4
      if: always() # 确保即使脚本报错了，也能把报错截图传上来供你排查
      with:
        name: zo-computer-live-ui # 压缩包的名字
        path: ./*.png             # 匹配所有的 png 截图
        retention-days: 3         # 自动留存3天，过期自动清理节约空间
